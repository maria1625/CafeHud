services:
  mongo:
    image: mongo:7-jammy
    container_name: cafe_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: cafe-spa
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db
    networks:
      - cafe_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cafe_backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 4000
      NODE_ENV: production
      MONGODB_URI: mongodb://root:example@mongo:27017/cafe-spa?authSource=admin
      URL: mongodb://root:example@mongo:27017/cafe-spa?authSource=admin
      SECRET: cafe_spa_jwt_secret_key_2024_change_in_production_very_long_and_secure
      JWT_SECRET: cafe_spa_jwt_secret_key_2024_change_in_production_very_long_and_secure
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      LOG_LEVEL: info
    networks:
      - cafe_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
    container_name: cafe_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - cafe_network

networks:
  cafe_network:
    driver: bridge

volumes:
  mongo_data: